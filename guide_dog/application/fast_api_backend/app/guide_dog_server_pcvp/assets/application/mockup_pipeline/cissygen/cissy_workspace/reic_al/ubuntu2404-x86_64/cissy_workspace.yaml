config:
  generators: VirtualRunEnv, ln_env, ln_paths
  process_manager:
    requires:
    - links_and_nodes_manager/[^2.6]@common/stable
    - links_and_nodes_ln_msgdef/2.8.2@common/stable
    requires_from_all: .*ln_msgdef
    start_command: ln_manager -c manager.lnc
processes:
  dense_pose_pcvp:
    node: localhost
    options:
    - '*:python_version=3'
    requires:
    - dense_pose_pcvp/2.4.5@semsa/unstable
  flask_server_pcvp:
    node: localhost
    requires:
    - flask_pcvp/0.10.0@semsa/unstable
  m3t_refiner_pcvp:
    node: localhost
    requires:
    - m3t_refiner_cpp_pcvp/0.3.0@semsa/unstable
  pcvp_manager:
    node: localhost
    requires:
    - pcvp_manager/3.1.0@semsa/unstable
  yolov7_pcvp:
    node: localhost
    options:
    - '*:python_version=3'
    requires:
    - yolov7_pcvp/main@semsa/snapshot
