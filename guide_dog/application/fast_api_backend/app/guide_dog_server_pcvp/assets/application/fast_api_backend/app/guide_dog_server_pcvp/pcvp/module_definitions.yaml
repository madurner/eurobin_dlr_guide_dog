module_config_version: "3.0.0"
name: "guide_dog_server_pcvp"
interfaces:
  detected_pose_image:  #interface
    input:
      overlay:    #slot
        image:        #datentyp
          meaning: rgb
          value_type: uint8
          intrinsics: with
          timestamp: with_or_without
      poses:
        dynamic_array:
          rich_transformation_se3:
            class_name: with
            instance_id: with
            confidence: with_or_without
            frame_names: without
            timestamp: without
    output: ~

  color_image_from_client:
    output:
      color_img:
        image:
          meaning: rgb
          value_type: uint8
          intrinsics: with
          timestamp: with_or_without
      dummy_poses:
        dynamic_array:
          rich_transformation_se3:
            class_name: with
            instance_id: with
            confidence: with_or_without
            frame_names: without
            timestamp: without
    input: ~
