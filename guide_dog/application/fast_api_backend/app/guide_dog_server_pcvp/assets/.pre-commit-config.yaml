repos:
  # Ruff: fast linter
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.14.14  # Check for latest version
    hooks:
      - id: ruff
        args: ["--fix"]  # Automatically fix some issues on commit

  # Black: code formatter
  - repo: https://github.com/psf/black
    rev: 23.3.0  # Use latest stable
    hooks:
      - id: black
        args: ["application/"]

  # isort: import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.12.0  # Use latest stable
    hooks:
      - id: isort
        args: ["--profile=black"]

  # mypy: type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.5.1  # Check latest
    hooks:
      - id: mypy
        args: ["application/", "--ignore-missing-imports"]
        stages: [manual]

  # Optional: check for trailing whitespace
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
